<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Présentation Masse Salariale - Groupe Métropole & Waka</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 40px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* En-tête strict du rapport PDF */
        .slide-header { margin-bottom: 25px; }
        .slide-header h1 {
            font-size: 24pt;
            color: #0f172a;
            margin: 0;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }
        .slide-header p { margin: 6px 0 0 0; color: #475569; font-size: 12pt; }

        /* Layout bi-panneaux asymétrique */
        .slide-content {
            display: flex;
            gap: 24px;
            flex-grow: 1;
            align-items: stretch;
            margin-bottom: 30px;
            height: 70%;
        }

        /* Cartes Blanches épurées */
        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        .card-left { flex: 1.4; overflow-y: auto; position: relative; }
        .card-right { flex: 1; justify-content: space-between; }

        /* Tableaux Financiers */
        table { width: 100%; border-collapse: collapse; font-size: 10pt; text-align: right; }
        th, td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; }
        th { color: #475569; font-weight: 500; text-align: right; }
        .text-left { text-align: left !important; }
        tr:last-child td { border-bottom: none; }
        
        .evo-up { color: #dc2626; font-weight: bold; }   
        .evo-down { color: #16a34a; font-weight: bold; } 

        /* En-tête de la section d'analyse */
        .right-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .right-card-header h2 { font-size: 13pt; color: #1e3a8a; margin: 0; font-weight: 700; }
        
        .gemini-btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 10pt;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .gemini-btn:hover { background-color: #1d4ed8; }

        /* Zone d'analyse éditable */
        .commentary-box { font-size: 11pt; line-height: 1.7; color: #334155; flex-grow: 1; overflow-y: auto; }
        .commentary-box ul { margin: 0; padding-left: 20px; }
        .commentary-box li { margin-bottom: 15px; }

        .card-footer-notes {
            display: flex;
            justify-content: space-between;
            font-size: 8.5pt;
            color: #94a3b8;
            margin-top: 15px;
            font-style: italic;
        }
        .table-note { font-size: 8.5pt; color: #64748b; font-style: italic; margin-top: auto; padding-top: 15px; }

        /* Graphiques automatiques */
        .chart-wrapper { 
            display: flex; 
            align-items: flex-end; 
            justify-content: space-around; 
            height: 220px; 
            border-bottom: 1px solid #cbd5e1; 
            padding-bottom: 8px; 
            width: 100%; 
            margin-top: 35px; 
        }
        .chart-wrapper-month { display: flex; flex-direction: column; align-items: center; width: 14%; }
        .bar-pair { display: flex; align-items: flex-end; gap: 6px; height: 100%; width: 100%; justify-content: center; }
        .bar { width: 20px; border-radius: 2px 2px 0 0; position: relative; transition: height 0.4s ease-out; }
        .bar-25 { background-color: #cbd5e1; }
        .bar-26 { background-color: #2563eb; }
        
        .bar::before {
            content: attr(data-value);
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8pt;
            font-weight: bold;
            color: #334155;
            white-space: nowrap;
        }
        .bar-label { font-size: 9pt; color: #64748b; margin-top: 10px; font-weight: 600; }

        /* Navigation */
        .slide-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10pt;
            color: #475569;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        .nav-arrows { display: flex; gap: 8px; }
        .arrow-btn {
            background: white;
            border: 1px solid #cbd5e1;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            color: #334155;
            font-weight: bold;
        }
        .arrow-btn:hover { background: #f8fafc; }
        
        /* Écran de chargement initial */
        #loader {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-size: 14pt; color: #475569; font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- ZONE DE CHARGEMENT SYNCHRO -->
    <div id="loader">
        <p>🔄 Synchronisation directe depuis l'onglet "Récap"...</p>
        <span style="font-size: 10pt; color: #94a3b8; font-weight: normal;">Construction des graphiques et des calculs d'évolution en cours...</span>
    </div>

    <!-- CONTENEUR PRÉSENTATION -->
    <div id="presentation-container" style="height: 100%; display: none; flex-direction: column; justify-content: space-between;">
        <div id="dynamic-slide-target" style="display: flex; flex-direction: column; height: 100%; justify-content: space-between;"></div>
    </div>

<script>
    // LIEN WEB MACRO MIS À JOUR DEPUIS TON SHEET
    const APPS_SCRIPT_WEBAPP_URL = ""https://script.google.com/macros/s/AKfycbylPkmMhrW_H7yoUqQseX7-qG-yRo6OU9kUfDskBJywD09d-brDEVmln6wAs3yV5g6ckA/exec";

    let rawData2026 = {};
    let rawData2025H1 = {};
    
    const totalGroupMensuel2025 = [241.9, 251.2, 244.8, 259.8, 254.9, 262.1];
    const moisLabels = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin'];
    let currentSlide = 7; 

    function getSum(arr) { return arr.reduce((a, b) => a + b, 0); }
    
    async function loadLiveSheetsData() {
        try {
            const response = await fetch(APPS_SCRIPT_WEBAPP_URL, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "get_data" })
            });
            const data = await response.json();
            
            rawData2026 = data.rawData2026;
            rawData2025H1 = data.rawData2025H1;
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('presentation-container').style.display = 'flex';
            
            renderSlide(currentSlide);
        } catch (error) {
            document.getElementById('loader').innerHTML = `
                <p style="color:#dc2626;">⚠️ Erreur de synchronisation Web.</p>
                <span style="font-size:10pt; color:#64748b;">Vérifiez le déploiement Web sur "Quiconque" ou le nom de l'onglet dans Sheets.</span>
            `;
        }
    }

    function buildTableRowsHTML() {
        let html = '';
        Object.keys(rawData2026).forEach(entite => {
            const h125 = rawData2025H1[entite] || 0;
            const h126 = getSum(rawData2026[entite]) || 0;
            const evo = h125 > 0 ? ((h126 - h125) / h125) * 100 : 0;
            const classEvo = evo > 0 ? 'evo-up' : 'evo-down';
            
            html += `<tr>
                <td class="text-left" style="font-weight:600;">${entite}</td>
                <td>${h125.toFixed(1)} M</td>
                <td>${h126.toFixed(1)} M</td>
                <td class="${classEvo}">${evo > 0 ? '+' : ''}${evo.toFixed(1)}%</td>
            </tr>`;
        });
        return html;
    }

    function renderSlide(slideNum) {
        const target = document.getElementById('dynamic-slide-target');
        let leftContent = ''; let rightContent = ''; let title = ''; let subtitle = '';

        const totalGroupMensuel2026 = [0, 0, 0, 0, 0, 0];
        Object.keys(rawData2026).forEach(entite => {
            for(let m=0; m<6; m++) totalGroupMensuel2026[m] += rawData2026[entite][m];
        });

        let totalBrutH12026 = 0;
        Object.keys(rawData2026).forEach(e => totalBrutH12026 += getSum(rawData2026[e]));

        switch(slideNum) {
            case 1:
                title = "ANALYSE BUDGÉTAIRE FINANCIÈRE H1";
                subtitle = "Rapport analytique cadre de la masse salariale du groupe";
                leftContent = `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center;">
                    <h2 style="font-size:20pt; color:#1e3a8a; margin-bottom:10px;">Suivi Consolidé Direct</h2>
                    <p style="color:#64748b; font-size:11pt; margin:0;">Données synchronisées en direct depuis l'onglet Récap</p>
                </div>`;
                rightContent = `<li><b>Statut :</b> Connecté à la Sheet. Utilisez le bouton ci-dessus pour lancer l'interprétation par l'IA.</li>`;
                break;
            case 2:
                title = "SYNTHÈSE FINANCIÈRE GLOBALE";
                subtitle = "Indicateurs consolidés de performance budgétaire";
                leftContent = `<div style="padding:10px;">
                    <span style="color:#475569; font-size:10pt; text-transform:uppercase; font-weight:600;">Cumul Brut Consolidé H1 2026</span>
                    <p style="font-size:28pt; font-weight:800; color:#2563eb; margin:12px 0 0 0;">${(totalBrutH12026).toFixed(1)} M Ar</p>
                    <hr style="border:0; border-top:1px solid #e2e8f0; margin:20px 0;">
                    <span style="color:#475569; font-size:10pt; text-transform:uppercase; font-weight:600;">État de la balance générale</span>
                    <p style="font-size:13pt; margin:10px 0 0 0; color:#475569;">Données issues du Grand Livre connecté.</p>
                </div>`;
                rightContent = `<li>Cliquez sur Analyser pour extraire les faits marquants liés à ce volume consolidé.</li>`;
                break;
            case 3:
                title = "TRAJECTOIRE MENSUELLE COMPARÉE";
                subtitle = "Comparatif de l'enveloppe budgétaire globale par mois (M Ar)";
                let s3ChartHtml = `<div class="chart-wrapper">`;
                let maxS3 = Math.max(...totalGroupMensuel2025, ...totalGroupMensuel2026);
                for(let m=0; m<6; m++) {
                    let h25 = (totalGroupMensuel2025[m] / maxS3) * 78; 
                    let h26 = (totalGroupMensuel2026[m] / maxS3) * 78;
                    s3ChartHtml += `
                        <div class="chart-wrapper-month">
                            <div class="bar-pair">
                                <div class="bar bar-25" style="height:${h25}%;" data-value="${totalGroupMensuel2025[m].toFixed(0)}"></div>
                                <div class="bar bar-26" style="height:${h26}%;" data-value="${totalGroupMensuel2026[m].toFixed(0)}"></div>
                            </div>
                            <div class="bar-label">${moisLabels[m].substring(0,4)}</div>
                        </div>`;
                }
                s3ChartHtml += `</div>`;
                leftContent = s3ChartHtml;
                rightContent = `<li>Analyse des tendances saisonnières disponible via l'analyse IA.</li>`;
                break;
            case 4:
                title = "RÉPARTITION MACRO DU PORTEFEUILLE";
                subtitle = "Mesure du poids financier relatif de chaque filiale";
                leftContent = `<table>
                    <thead><tr><th class="text-left">Entité</th><th>Total H1 Direct (M Ar)</th></tr></thead>
                    <tbody>
                        <tr><td class="text-left">WAKA</td><td>${getSum(rawData2026['WAKA'] || [0]).toFixed(1)} M</td></tr>
                        <tr><td class="text-left">METROPOLE</td><td>${getSum(rawData2026['METROPOLE'] || [0]).toFixed(1)} M</td></tr>
                        <tr><td class="text-left">PARAMAD</td><td>${getSum(rawData2026['PARAMAD'] || [0]).toFixed(1)} M</td></tr>
                    </tbody>
                </table>`;
                rightContent = `<li>Générez l'axe d'analyse pour observer les écarts de concentration.</li>`;
                break;
            case 5:
                title = "PERFORMANCE INTERNE : DIGUE";
                subtitle = "Modèle d'excellence opérationnelle et de respect budgétaire local";
                let digue25 = rawData2025H1['DIGUE'] || 1;
                let digue26 = getSum(rawData2026['DIGUE'] || [0]);
                let varDigue = ((digue26 - digue25) / digue25) * 100;
                leftContent = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:15px;">
                    <div style="background:#f8fafc; padding:12px; border-radius:6px; border:1px solid #e2e8f0;">
                        <small style="color:#64748b;">H1 2025</small><br><b>${digue25.toFixed(1)} M Ar</b>
                    </div>
                    <div style="background:#f8fafc; padding:12px; border-radius:6px; border:1px solid #e2e8f0;">
                        <small style="color:#64748b;">H1 2026</small><br><b>${digue26.toFixed(1)} M Ar</b>
                    </div>
                </div>
                <div style="background:#f0fdf4; border:1px solid #bbf7d0; padding:14px; border-radius:6px; text-align:center; color:#16a34a; font-weight:bold; font-size:14pt;">
                    Variation : ${varDigue > 0 ? '+' : ''}${varDigue.toFixed(1)}%
                </div>`;
                rightContent = `<li>Prêt à analyser la politique RH locale de l'entité Digue.</li>`;
                break;
            case 6:
                title = "FOCUS CRITIQUE : STRUCTURE WAKA";
                subtitle = "Alimentation mensuelle brute de la filiale principale (M Ar)";
                let wakaData = rawData2026['WAKA'] || [0,0,0,0,0,0];
                let maxWaka = Math.max(...wakaData, 1);
                let s6ChartHtml = `<div class="chart-wrapper">`;
                for(let m=0; m<6; m++) {
                    let hWaka = (wakaData[m] / maxWaka) * 78;
                    s6ChartHtml += `
                        <div class="chart-wrapper-month" style="width:15%;">
                            <div class="bar-pair">
                                <div class="bar" style="height:${hWaka}%; background-color:#dc2626;" data-value="${wakaData[m].toFixed(1)}"></div>
                            </div>
                            <div class="bar-label">${moisLabels[m].substring(0,4)}</div>
                        </div>`;
                }
                s6ChartHtml += `</div>`;
                leftContent = s6ChartHtml;
                rightContent = `<li>Axe d'analyse requis pour auditer l'anomalie sur l'enveloppe de Waka.</li>`;
                break;
            
            case 7: 
                title = "CROISSANCE DES ENTITÉS (SEMESTRE 1)";
                subtitle = "Matrice comparative de performance budgétaire entre H1 2025 et H1 2026";
                leftContent = `
                    <table>
                        <thead>
                            <tr>
                                <th class="text-left">Entité</th>
                                <th>Total H1 2025</th>
                                <th>Total H1 2026</th>
                                <th>Évolution (%)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${buildTableRowsHTML()}
                        </tbody>
                    </table>
                    <div class="table-note">*Toutes les lignes ci-dessus s'ajustent d'elles-mêmes à chaque mise à jour de ta Sheet.</div>
                `;
                rightContent = `
                    <li><b>Prêt :</b> Cliquez sur le bouton "Analyser avec Gemini" pour commenter dynamiquement ces écarts de croissance.</li>
                `;
                break;

            case 8:
                title = "AUDIT DÉRIVES : BAZAR BE & KANACIA";
                subtitle = "Analyse ciblée des écarts de dotation de personnel";
                leftContent = `<p>Les tableaux détaillés de sur-effectifs s'alignent automatiquement sur la balance générale.</p>`;
                rightContent = `<li>Prêt pour l'audit opérationnel.</li>`;
                break;
            case 9:
                title = "CORRÉLATION ENVELOPPES BRUT VS NET";
                subtitle = "Mesure de l'impact des charges et cotisations du groupe";
                leftContent = `<p style="font-size:10.5pt; line-height:1.6; margin:0; color:#475569;">Validation automatique du taux de charges patronales et salariales du grand livre.</p>`;
                rightContent = `<li>Prêt pour l'analyse des provisions fiscales.</li>`;
                break;
            case 10:
                title = "GRAND LIVRE MENSUEL H1 2026";
                subtitle = "Matrice analytique complète par mois et par filiale (M Ar)";
                let s10Table = `<div style="overflow-x:auto; font-size:8.5pt;"><table><thead><tr><th class="text-left">Mois</th>`;
                Object.keys(rawData2026).forEach(e => { s10Table += `<th>${e.substring(0,3)}</th>`; });
                s10Table += `</tr></thead><tbody>`;
                for(let m=0; m<6; m++) {
                    s10Table += `<tr><td class="text-left" style="font-weight:600;">${moisLabels[m].substring(0,4)}</td>`;
                    Object.keys(rawData2026).forEach(e => { s10Table += `<td>${(rawData2026[e][m] || 0).toFixed(1)}</td>`; });
                    s10Table += `</tr>`;
                }
                s10Table += `</tbody></table></div>`;
                leftContent = s10Table;
                rightContent = `<li>Validation des balances comptables mensuelles disponible.</li>`;
                break;
            case 11:
                title = "EFFICIENCE DES POSTES DE TRAVAIL";
                subtitle = "Contrôle d'allocation des ressources sur les points de vente";
                leftContent = `<blockquote style="border-left:4px solid #2563eb; padding-left:14px; margin:0; font-style:italic; color:#334155; font-size:11pt;">
                    <b>Règle de gestion standardisée :</b><br>
                    "Une seule personne par comptoir, aucun doublon autorisé. Nomenclature stricte : C1, C2, C3, PA, BO, ASU".
                </blockquote>`;
                rightContent = `<li>Analyse d'adéquation des plannings disponible.</li>`;
                break;
            case 12:
                title = "DIRECTIVES STRATÉGIQUES ET CADRE H2";
                subtitle = "Plan de redressement budgétaire et d'harmonisation";
                leftContent = `<p>Directives stratégiques associées aux clôtures du premier semestre.</p>`;
                rightContent = `<li>Objectifs financiers de fin de période.</li>`;
                break;
        }

        target.innerHTML = `
            <div class="slide-header">
                <h1>${title}</h1>
                <p>${subtitle}</p>
            </div>
            <div class="slide-content">
                <div class="card card-left">${leftContent}</div>
                <div class="card card-right">
                    <div>
                        <div class="right-card-header">
                            <h2>Axe d'analyse</h2>
                            <button class="gemini-btn" onclick="triggerGeminiAnalysis(${slideNum})">✨ Analyser avec Gemini</button>
                        </div>
                        <div class="commentary-box" contenteditable="true" id="commentary-target">
                            <ul>${rightContent}</ul>
                        </div>
                    </div>
                    <div class="card-footer-notes">
                        <span>💡 Zone modifiable (Texte libre)</span>
                        <span>Cache actif</span>
                    </div>
                </div>
            </div>
            <div class="slide-footer">
                <span>Groupe Métropole & Waka</span>
                <div class="nav-arrows">
                    <button class="arrow-btn" onclick="changeSlide(-1)">◀</button>
                    <button class="arrow-btn" onclick="changeSlide(1)">▶</button>
                </div>
                <span>Slide ${slideNum} / 12</span>
            </div>
        `;
    }

    async function triggerGeminiAnalysis(slideId) {
        const box = document.getElementById('commentary-target');
        const btn = document.querySelector('.gemini-btn');
        
        btn.disabled = true;
        btn.innerText = "🔄 Calcul...";
        box.innerHTML = "<li>⚡ Analyse en direct de l'onglet Récap en cours...</li>";

        try {
            const response = await fetch(APPS_SCRIPT_WEBAPP_URL, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "analyze", slideId: slideId, rawData2026: rawData2026 })
            });
            const resText = await response.text();
            box.innerHTML = resText;
        } catch (err) {
            box.innerHTML = `<li>⚠️ Erreur lors de la génération de l'analyse.</li>`;
        } finally {
            btn.disabled = false;
            btn.innerHTML = "✨ Analyser avec Gemini";
        }
    }

    function changeSlide(direction) {
        currentSlide += direction;
        if(currentSlide < 1) currentSlide = 1;
        if(currentSlide > 12) currentSlide = 12;
        renderSlide(currentSlide);
    }

    window.onload = function() {
        loadLiveSheetsData();
    };
</script>
</body>
</html>
